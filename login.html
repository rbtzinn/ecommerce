<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <nav>
        <a href="index.html"><img src="./images/logo.png" alt="Logo da Loja"></a>
        <ul>
            <li><a href="#roupas">Roupas</a></li>
            <li><a href="#eletronicos">Eletrônicos</a></li>
            <li><a href="#calcados">Calçados</a></li>
            <li><a href="#acessorios">Acessórios</a></li>
            <li><a href="#promocoes">Ofertas</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <h1>Entrar</h1>
        <form action="/login" method="POST">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        <p class="redirect">Não tem uma conta? <a href="register.html">Cadastre-se</a></p>
    </div>
</body>

</html>
